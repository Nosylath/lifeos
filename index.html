<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Life OS — MVP Limpo</title>
<style>
:root{
  --bg:#08080e;
  --surface:#111119;
  --surface2:#1a1a26;
  --surface3:#242435;
  --border:rgba(255,255,255,.10);
  --text:#f2f2f7;
  --muted:#85859a;
  --accent:#7c6aff;
  --gold:#ffd166;
  --green:#3dffaa;
  --red:#ff6a6a;
  --orange:#ff8a3d;
  --blue:#6ab4ff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  background:radial-gradient(circle at top right, rgba(124,106,255,.18), transparent 35%), var(--bg);
  color:var(--text);
  font-family:Arial, sans-serif;
}
nav{
  height:58px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 18px;
  background:rgba(8,8,14,.88);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:10;
}
.logo{
  font-weight:800;
  letter-spacing:.12em;
  color:var(--accent);
  font-size:14px;
}
.tabs{display:flex;gap:6px}
.tab{
  border:0;
  background:transparent;
  color:var(--muted);
  padding:8px 10px;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
}
.tab.active{background:var(--surface2);color:var(--text)}
.streak{
  color:var(--orange);
  font-size:13px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:99px;
  padding:6px 10px;
}
main{
  max-width:780px;
  margin:0 auto;
  padding:26px 16px 80px;
}
.page{display:none}
.page.active{display:block}
.hero{margin-bottom:20px}
.greeting{color:var(--muted);font-size:14px;margin-bottom:6px}
h1{font-size:30px;margin-bottom:4px}
.subtitle{color:var(--muted);font-size:14px}
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px;
  margin-bottom:16px;
}
.row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.label{
  color:var(--muted);
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.08em;
  margin-bottom:6px;
}
.big{font-size:24px;font-weight:900;color:var(--gold)}
.level-name{color:var(--accent);font-weight:800}
.bar-bg{
  width:100%;
  height:8px;
  border-radius:99px;
  background:var(--surface3);
  overflow:hidden;
  margin:12px 0 8px;
}
.bar-fill{
  height:100%;
  background:var(--gold);
  width:0%;
  transition:.3s;
}
.small{font-size:12px;color:var(--muted)}
.section-title{
  color:var(--muted);
  font-weight:900;
  letter-spacing:.1em;
  text-transform:uppercase;
  font-size:13px;
  margin:20px 0 10px;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.pillar{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:14px;
}
.pillar-top{display:flex;justify-content:space-between;margin-bottom:10px}
.pillar-name{font-size:13px;font-weight:900;margin-bottom:8px}
.pillar-xp{color:var(--muted);font-size:12px}
.btn{
  border:0;
  background:var(--accent);
  color:white;
  border-radius:12px;
  padding:10px 14px;
  cursor:pointer;
  font-weight:900;
}
.btn.secondary{
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--text);
}
.btn.danger{background:var(--red)}
.btn.small-btn{padding:6px 10px;font-size:12px}
.list{display:flex;flex-direction:column;gap:10px}
.objective,.mission{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
}
.objective-title,.mission-title{font-weight:800;margin-bottom:5px}
.meta{font-size:12px;color:var(--muted);line-height:1.4}
.mission{
  display:flex;
  align-items:flex-start;
  gap:10px;
  cursor:pointer;
}
.check{
  width:22px;
  height:22px;
  border-radius:7px;
  border:2px solid var(--muted);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  font-size:13px;
  font-weight:900;
}
.mission.done{opacity:.52}
.mission.done .mission-title{text-decoration:line-through}
.mission.done .check{background:var(--green);border-color:var(--green);color:#000}
.mission-body{flex:1}
.xp{color:var(--gold);font-weight:900;font-size:13px}
.empty{
  padding:34px 16px;
  text-align:center;
  color:var(--muted);
  border:1px dashed var(--border);
  border-radius:16px;
}
.modal-bg{
  display:none;
  position:fixed;
  inset:0;
  z-index:20;
  background:rgba(0,0,0,.72);
  align-items:center;
  justify-content:center;
  padding:16px;
}
.modal-bg.open{display:flex}
.modal{
  width:100%;
  max-width:500px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:20px;
}
.modal h2{margin-bottom:14px}
.field{margin-bottom:12px}
.field label{
  display:block;
  color:var(--muted);
  font-size:12px;
  margin-bottom:6px;
}
input,textarea,select{
  width:100%;
  background:var(--surface2);
  color:var(--text);
  border:1px solid var(--border);
  border-radius:12px;
  padding:11px;
  outline:none;
}
textarea{min-height:80px;resize:vertical}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal-actions .btn{flex:1}
.toast{
  position:fixed;
  left:50%;
  bottom:20px;
  transform:translateX(-50%) translateY(80px);
  background:var(--green);
  color:#000;
  padding:10px 18px;
  border-radius:99px;
  font-weight:900;
  transition:.25s;
  z-index:30;
}
.toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:520px){
  .grid{grid-template-columns:1fr}
  h1{font-size:26px}
  nav{padding:0 10px}
  .tab{padding:7px 8px;font-size:12px}
}
</style>
</head>
<body>

  <button onclick="testGemini()">Testar Gemini</button>
<nav>
  <div class="logo">LIFE OS</div>
  <div class="tabs">
    <button class="tab active" onclick="showPage('dash')">Painel</button>
    <button class="tab" onclick="showPage('missions')">Missões</button>
    <button class="tab" onclick="showPage('objectives')">Objetivos</button>
  </div>
  <div class="streak">🔥 <span id="streak">0</span>d</div>
</nav>

<main>
  <section class="page active" id="page-dash">
    <div class="hero">
      <div class="greeting" id="greeting">Bom dia,</div>
      <h1>Sony Carvalho</h1>
      <div class="subtitle" id="subtitle">Nível 1 · Iniciante</div>
    </div>

    <div class="card">
      <div class="row">
        <div>
          <div class="label">XP total</div>
          <div class="big" id="total-xp">0 XP</div>
        </div>
        <div style="text-align:right">
          <div class="label">Nível</div>
          <div class="level-name" id="level-name">Nível 1 · Iniciante</div>
        </div>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="global-bar"></div></div>
      <div class="small" id="next-level">0 / 1000 XP para o próximo nível</div>
    </div>

    <div class="section-title">Pilares</div>
    <div class="grid" id="pillar-grid"></div>

    <div class="section-title">Objetivos ativos</div>
    <div class="list" id="dash-objectives"></div>
  </section>

  <section class="page" id="page-missions">
    <div class="row" style="margin-bottom:16px">
      <div>
        <h1 style="font-size:24px">Missões</h1>
        <div class="small" id="today-label"></div>
      </div>
      <button class="btn" onclick="openModal('mission-modal')">+ Manual</button>
    </div>

    <div class="card">
      <div class="row">
        <span class="label" style="margin:0">XP de hoje</span>
        <span class="big" style="font-size:18px" id="today-xp">0 XP</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="today-bar"></div></div>
    </div>

    <div class="list" id="mission-list"></div>
  </section>

  <section class="page" id="page-objectives">
    <div class="row" style="margin-bottom:16px">
      <h1 style="font-size:24px">Objetivos</h1>
      <button class="btn" onclick="openModal('objective-modal')">+ Novo</button>
    </div>
    <div class="list" id="objective-list"></div>
  </section>
</main>

<div class="modal-bg" id="objective-modal">
  <div class="modal">
    <h2>Novo objetivo</h2>
    <div class="field">
      <label>O que você quer conquistar?</label>
      <input id="obj-title" placeholder="Ex: Atingir 95kg e 15% de gordura" />
    </div>
    <div class="field">
      <label>Pilar</label>
      <select id="obj-pillar">
        <option value="fisico">Físico</option>
        <option value="financeiro">Financeiro</option>
        <option value="intelecto">Intelecto</option>
        <option value="autoridade">Autoridade</option>
      </select>
    </div>
    <div class="field">
      <label>Situação atual</label>
      <textarea id="obj-current" placeholder="Ex: 90kg, 33% gordura, sedentário"></textarea>
    </div>
    <div class="field">
      <label>Meta mensurável</label>
      <input id="obj-target" placeholder="Ex: 95kg, 15% gordura" />
    </div>
    <div class="field">
      <label>Prazo</label>
      <input id="obj-deadline" type="date" />
    </div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeModal('objective-modal')">Cancelar</button>
      <button class="btn" onclick="saveObjective()">Criar objetivo</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="mission-modal">
  <div class="modal">
    <h2>Missão manual</h2>
    <div class="field">
      <label>Missão</label>
      <input id="mission-title" placeholder="Ex: Caminhar 20 minutos" />
    </div>
    <div class="field">
      <label>Pilar</label>
      <select id="mission-pillar">
        <option value="fisico">Físico</option>
        <option value="financeiro">Financeiro</option>
        <option value="intelecto">Intelecto</option>
        <option value="autoridade">Autoridade</option>
      </select>
    </div>
    <div class="field">
      <label>XP</label>
      <input id="mission-xp" type="number" min="10" max="100" value="30" />
    </div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeModal('mission-modal')">Cancelar</button>
      <button class="btn" onclick="saveMission()">Adicionar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const GEMINI_API_KEY = "AIzaSyDHD17qHckzAZq869WhKggHK3NwLdz3bJQ";

async function askGemini(prompt) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`;

  const response = await fetch(url, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      contents: [
        {
          parts: [{ text: prompt }]
        }
      ]
    })
  });

  const data = await response.json();

  if (!response.ok) {
    console.error("Erro Gemini:", data);
    throw new Error("Erro ao chamar Gemini");
  }

  return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
}

async function testGemini() {
  const resposta = await askGemini("Responda apenas: Gemini conectado ao Life OS.");
  alert(resposta);
}
  
  const STORAGE_KEY = 'lifeos_clean_v1';

const PILLARS = {
  fisico: { name:'FÍSICO', icon:'🏋️', color:'var(--orange)' },
  financeiro: { name:'FINANCEIRO', icon:'💰', color:'var(--green)' },
  intelecto: { name:'INTELECTO', icon:'🧠', color:'var(--blue)' },
  autoridade: { name:'AUTORIDADE', icon:'⚡', color:'var(--gold)' }
};

const LEVELS = [
  { min:0, max:999, name:'Iniciante' },
  { min:1000, max:2999, name:'Desperto' },
  { min:3000, max:5999, name:'Determinado' },
  { min:6000, max:9999, name:'Focado' },
  { min:10000, max:14999, name:'Consistente' },
  { min:15000, max:24999, name:'Avançado' },
  { min:25000, max:49999, name:'Elite' },
  { min:50000, max:Infinity, name:'Lendário' }
];

let state = loadState() || {
  totalXP: 0,
  streak: 0,
  lastActiveDay: null,
  objectives: [],
  missions: []
};

function loadState(){
  try{
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? JSON.parse(saved) : null;
  }catch(e){
    localStorage.removeItem(STORAGE_KEY);
    return null;
  }
}

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function escapeHtml(value){
  return String(value ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'","&#039;");
}

function todayKey(){
  return new Date().toISOString().slice(0,10);
}

function todayLabel(){
  return new Date().toLocaleDateString('pt-BR',{weekday:'long', day:'numeric', month:'long'});
}

function getGreeting(){
  const h = new Date().getHours();
  if(h < 12) return 'Bom dia,';
  if(h < 18) return 'Boa tarde,';
  return 'Boa noite,';
}

function getLevel(xp){
  for(let i = LEVELS.length - 1; i >= 0; i--){
    const level = LEVELS[i];
    if(xp >= level.min){
      const range = level.max === Infinity ? 1 : level.max - level.min + 1;
      const pct = level.max === Infinity ? 100 : Math.round(((xp - level.min) / range) * 100);
      return { ...level, index:i+1, pct:Math.min(100, Math.max(0, pct)) };
    }
  }
  return { ...LEVELS[0], index:1, pct:0 };
}

function daysLeft(date){
  if(!date) return null;
  const diff = new Date(date + 'T12:00') - new Date();
  return Math.max(0, Math.ceil(diff / 86400000));
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');

  const index = {dash:0, missions:1, objectives:2}[id];
  document.querySelectorAll('.tab')[index].classList.add('active');
  render();
}

function openModal(id){
  document.getElementById(id).classList.add('open');
}

function closeModal(id){
  document.getElementById(id).classList.remove('open');
}

function notify(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}

function getPillarXP(pillar){
  return state.missions
    .filter(m => m.pillar === pillar && m.done)
    .reduce((sum, m) => sum + m.xp, 0);
}

function todayMissions(){
  const key = todayKey();
  return state.missions.filter(m => m.date === key);
}

function generateStarterMissions(obj){
  const base = {
    fisico: [
      ['Registrar peso, cintura e energia de hoje', 25],
      ['Caminhar 15 minutos em ritmo leve', 30],
      ['Registrar alimentação do dia', 25]
    ],
    financeiro: [
      ['Anotar renda líquida atual', 30],
      ['Listar gastos fixos e dívidas', 40],
      ['Calcular quanto sobra ou falta no mês', 35]
    ],
    intelecto: [
      ['Estudar 25 minutos com foco total', 30],
      ['Criar 5 anotações ou cards de revisão', 25],
      ['Escrever um resumo curto do que aprendeu', 30]
    ],
    autoridade: [
      ['Anotar 3 ideias de conteúdo', 25],
      ['Escrever um rascunho curto de post', 35],
      ['Registrar uma lição aprendida hoje', 30]
    ]
  };

  return (base[obj.pillar] || base.intelecto).map((item, i) => ({
    id:'m_' + Date.now() + '_' + i,
    title:item[0],
    xp:item[1],
    pillar:obj.pillar,
    objectiveId:obj.id,
    objectiveTitle:obj.title,
    done:false,
    date:todayKey()
  }));
}

function saveObjective(){
  const title = document.getElementById('obj-title').value.trim();
  const pillar = document.getElementById('obj-pillar').value;
  const current = document.getElementById('obj-current').value.trim();
  const target = document.getElementById('obj-target').value.trim();
  const deadline = document.getElementById('obj-deadline').value;

  if(!title){
    notify('Digite um objetivo.');
    return;
  }

  const obj = {
    id:'o_' + Date.now(),
    title,
    pillar,
    current,
    target,
    deadline,
    done:false,
    createdAt:new Date().toISOString()
  };

  state.objectives.push(obj);
  state.missions.push(...generateStarterMissions(obj));
  save();

  document.getElementById('obj-title').value = '';
  document.getElementById('obj-current').value = '';
  document.getElementById('obj-target').value = '';
  document.getElementById('obj-deadline').value = '';

  closeModal('objective-modal');
  notify('Objetivo criado.');
  showPage('missions');
}

function saveMission(){
  const title = document.getElementById('mission-title').value.trim();
  const pillar = document.getElementById('mission-pillar').value;
  const xp = Math.min(100, Math.max(10, parseInt(document.getElementById('mission-xp').value, 10) || 30));

  if(!title){
    notify('Digite uma missão.');
    return;
  }

  state.missions.push({
    id:'m_' + Date.now(),
    title,
    xp,
    pillar,
    objectiveId:null,
    objectiveTitle:'Manual',
    done:false,
    date:todayKey()
  });

  save();

  document.getElementById('mission-title').value = '';
  document.getElementById('mission-xp').value = '30';

  closeModal('mission-modal');
  notify('Missão adicionada.');
  render();
}

function toggleMission(id){
  const mission = state.missions.find(m => m.id === id);
  if(!mission) return;

  mission.done = !mission.done;
  state.totalXP = Math.max(0, state.totalXP + (mission.done ? mission.xp : -mission.xp));

  if(mission.done){
    const today = todayKey();
    if(state.lastActiveDay !== today){
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      const yKey = yesterday.toISOString().slice(0,10);

      if(state.lastActiveDay === yKey) state.streak += 1;
      else if(!state.lastActiveDay) state.streak = 1;
      else state.streak = 1;

      state.lastActiveDay = today;
    }
    notify('+' + mission.xp + ' XP');
  }

  save();
  render();
}

function deleteObjective(id){
  state.objectives = state.objectives.filter(o => o.id !== id);
  state.missions = state.missions.filter(m => m.objectiveId !== id);
  save();
  render();
  notify('Objetivo removido.');
}

function deleteMission(id){
  const mission = state.missions.find(m => m.id === id);
  if(mission && mission.done){
    state.totalXP = Math.max(0, state.totalXP - mission.xp);
  }
  state.missions = state.missions.filter(m => m.id !== id);
  save();
  render();
}

function renderDash(){
  document.getElementById('greeting').textContent = getGreeting();
  document.getElementById('streak').textContent = state.streak;

  const level = getLevel(state.totalXP);
  document.getElementById('subtitle').textContent = 'Nível ' + level.index + ' · ' + level.name;
  document.getElementById('total-xp').textContent = state.totalXP.toLocaleString('pt-BR') + ' XP';
  document.getElementById('level-name').textContent = 'Nível ' + level.index + ' · ' + level.name;
  document.getElementById('global-bar').style.width = level.pct + '%';
  document.getElementById('next-level').textContent =
    level.max === Infinity
      ? state.totalXP.toLocaleString('pt-BR') + ' XP · nível máximo'
      : state.totalXP.toLocaleString('pt-BR') + ' / ' + (level.max + 1).toLocaleString('pt-BR') + ' XP para o próximo nível';

  const pillarGrid = document.getElementById('pillar-grid');
  pillarGrid.innerHTML = Object.entries(PILLARS).map(([key, p]) => {
    const xp = getPillarXP(key);
    const lv = getLevel(xp);
    return `
      <div class="pillar">
        <div class="pillar-top">
          <span>${p.icon}</span>
          <span class="small">Lv ${lv.index}</span>
        </div>
        <div class="pillar-name" style="color:${p.color}">${p.name}</div>
        <div class="bar-bg"><div class="bar-fill" style="width:${lv.pct}%;background:${p.color}"></div></div>
        <div class="pillar-xp">${xp.toLocaleString('pt-BR')} XP</div>
      </div>
    `;
  }).join('');

  const active = state.objectives.filter(o => !o.done).slice(0,3);
  const list = document.getElementById('dash-objectives');
  if(!active.length){
    list.innerHTML = '<div class="empty">Nenhum objetivo ativo ainda.</div>';
    return;
  }

  list.innerHTML = active.map(o => {
    const pillar = PILLARS[o.pillar];
    const dl = daysLeft(o.deadline);
    return `
      <div class="objective">
        <div class="objective-title">${escapeHtml(o.title)}</div>
        <div class="meta">${pillar.icon} ${pillar.name}${dl !== null ? ' · ' + dl + ' dias restantes' : ''}</div>
      </div>
    `;
  }).join('');
}

function renderMissions(){
  document.getElementById('today-label').textContent = todayLabel();

  const missions = todayMissions();
  const doneXP = missions.filter(m => m.done).reduce((s,m) => s + m.xp, 0);
  const totalXP = missions.reduce((s,m) => s + m.xp, 0);
  const pct = totalXP ? Math.round(doneXP / totalXP * 100) : 0;

  document.getElementById('today-xp').textContent = doneXP + ' XP';
  document.getElementById('today-bar').style.width = pct + '%';

  const list = document.getElementById('mission-list');
  if(!missions.length){
    list.innerHTML = '<div class="empty">Nenhuma missão para hoje. Crie um objetivo ou adicione manualmente.</div>';
    return;
  }

  list.innerHTML = missions.map(m => {
    const pillar = PILLARS[m.pillar] || PILLARS.intelecto;
    return `
      <div class="mission ${m.done ? 'done' : ''}" onclick="toggleMission('${m.id}')">
        <div class="check">${m.done ? '✓' : ''}</div>
        <div class="mission-body">
          <div class="mission-title">${escapeHtml(m.title)}</div>
          <div class="meta">${pillar.icon} ${pillar.name} · ${escapeHtml(m.objectiveTitle || 'Manual')}</div>
        </div>
        <div class="xp">+${m.xp}</div>
        <button class="btn secondary small-btn" onclick="event.stopPropagation();deleteMission('${m.id}')">×</button>
      </div>
    `;
  }).join('');
}

function renderObjectives(){
  const list = document.getElementById('objective-list');
  if(!state.objectives.length){
    list.innerHTML = '<div class="empty">Nenhum objetivo ainda. Crie o primeiro.</div>';
    return;
  }

  list.innerHTML = state.objectives.map(o => {
    const pillar = PILLARS[o.pillar] || PILLARS.intelecto;
    const missions = state.missions.filter(m => m.objectiveId === o.id);
    const done = missions.filter(m => m.done).length;
    const pct = missions.length ? Math.round(done / missions.length * 100) : 0;
    const dl = daysLeft(o.deadline);

    return `
      <div class="objective">
        <div class="row">
          <div>
            <div class="objective-title">${escapeHtml(o.title)}</div>
            <div class="meta">${pillar.icon} ${pillar.name}${dl !== null ? ' · ' + dl + ' dias restantes' : ''}</div>
          </div>
          <button class="btn danger small-btn" onclick="deleteObjective('${o.id}')">Remover</button>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${pillar.color}"></div></div>
        <div class="meta">
          Progresso: ${done}/${missions.length} missões concluídas
          ${o.current ? '<br>Atual: ' + escapeHtml(o.current) : ''}
          ${o.target ? '<br>Meta: ' + escapeHtml(o.target) : ''}
        </div>
      </div>
    `;
  }).join('');
}

function render(){
  renderDash();
  renderMissions();
  renderObjectives();
}

render();
</script>
</body>
</html>
